# Source of truth for owogametools/ro-farmP .github/workflows/release.yml
# Bootstrap / re-sync onto farmP main when this file changes.
#
# Secrets (farmP repo):
#   RO_FARM_ARTIFACT_READ_TOKEN
#     - fine-grained PAT (preferred): resource owner with access to private owogametools/ro-farm only
#       Permissions: Contents Read, Metadata Read
#     - classic PAT: repo scope (read private repo Releases)
#     Used only to download private Release assets from ro-farm.
#     Release create on farmP uses GITHUB_TOKEN (github-actions[bot]).
#
# Secrets (ro-farm repo, companion):
#   RO_FARMP_RELEASE_TOKEN — fire repository_dispatch on farmP (Contents access on farmP)

name: Publish RoFarmer Release

on:
  repository_dispatch:
    types: [ro-farmer-release]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (e.g. v1.1.1)
        required: true
        type: string
      source_repo:
        description: Source repository (owner/name)
        required: false
        default: owogametools/ro-farm
        type: string
      asset_name:
        description: Release asset filename on private source
        required: false
        default: RoFarmer-win-x64.zip
        type: string
      version:
        description: Optional display version (defaults to tag without leading v)
        required: false
        type: string

# farmP Actions policy is local_only — do not use marketplace actions (uses:).
# Only shell steps + preinstalled gh/curl/jq.

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve payload
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            TAG='${{ github.event.client_payload.tag }}'
            VERSION='${{ github.event.client_payload.version }}'
            SOURCE_REPO='${{ github.event.client_payload.source_repo }}'
            ASSET_NAME='${{ github.event.client_payload.asset_name }}'
          else
            TAG='${{ inputs.tag }}'
            VERSION='${{ inputs.version }}'
            SOURCE_REPO='${{ inputs.source_repo }}'
            ASSET_NAME='${{ inputs.asset_name }}'
          fi

          if [ -z "$TAG" ]; then
            echo "tag is required" >&2
            exit 1
          fi
          if [ -z "${SOURCE_REPO:-}" ]; then
            SOURCE_REPO='owogametools/ro-farm'
          fi
          if [ -z "${ASSET_NAME:-}" ]; then
            ASSET_NAME='RoFarmer-win-x64.zip'
          fi
          if [ -z "${VERSION:-}" ]; then
            VERSION="${TAG#v}"
          fi

          {
            echo "tag=$TAG"
            echo "version=$VERSION"
            echo "source_repo=$SOURCE_REPO"
            echo "asset_name=$ASSET_NAME"
          } >> "$GITHUB_OUTPUT"

          echo "tag=$TAG version=$VERSION repo=$SOURCE_REPO asset=$ASSET_NAME"

      - name: Download private Release asset from ro-farm
        env:
          GH_TOKEN: ${{ secrets.RO_FARM_ARTIFACT_READ_TOKEN }}
          SOURCE_REPO: ${{ steps.meta.outputs.source_repo }}
          TAG: ${{ steps.meta.outputs.tag }}
          ASSET_NAME: ${{ steps.meta.outputs.asset_name }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "RO_FARM_ARTIFACT_READ_TOKEN secret is missing on farmP" >&2
            exit 1
          fi

          mkdir -p work
          cd work

          # Retry: private release asset can lag briefly after create/upload.
          for attempt in $(seq 1 12); do
            echo "Downloading $ASSET_NAME from $SOURCE_REPO@$TAG (attempt $attempt)"
            if gh release download "$TAG" \
              --repo "$SOURCE_REPO" \
              --pattern "$ASSET_NAME" \
              --clobber; then
              break
            fi
            echo "Asset not ready yet; sleeping 10s"
            sleep 10
          done

          if [ ! -f "$ASSET_NAME" ]; then
            echo "Failed to download $ASSET_NAME from $SOURCE_REPO release $TAG" >&2
            gh release view "$TAG" --repo "$SOURCE_REPO" >&2 || true
            exit 1
          fi

          cp -f "$ASSET_NAME" ../RoFarmer-win-x64.zip
          ls -la ../RoFarmer-win-x64.zip

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
          SOURCE_REPO: ${{ steps.meta.outputs.source_repo }}
        shell: bash
        run: |
          set -euo pipefail
          ZIP='RoFarmer-win-x64.zip'
          test -f "$ZIP"

          NOTES="RoFarmer ${VERSION} (win-x64 single-file)

          Ship contents inside \`RoFarmer-win-x64.zip\`:
          - \`RoFarmer.exe\`
          - \`img/\` (vision templates)
          - \`tessdata/\`

          Built from ${SOURCE_REPO} release ${TAG}."

          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG exists — uploading asset with --clobber"
            gh release upload "$TAG" "$ZIP" --clobber --repo "${{ github.repository }}"
            gh release edit "$TAG" --repo "${{ github.repository }}" --title "$TAG" --notes "$NOTES" --latest
          else
            echo "Creating release $TAG"
            # Asset-only target repo: gh creates a lightweight tag on default branch if missing.
            gh release create "$TAG" "$ZIP" \
              --repo "${{ github.repository }}" \
              --title "$TAG" \
              --notes "$NOTES" \
              --latest \
              --target main
          fi

          gh release view "$TAG" --repo "${{ github.repository }}"
